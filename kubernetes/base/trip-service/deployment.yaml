apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-service
  labels:
    app.kubernetes.io/name: trip-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: tripplanner
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trip-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trip-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: tripplanner
    spec:
      serviceAccountName: trip-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: trip-service
          image: docker.io/ptuyennn/tripplanner-trips:0.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: trip-service-config
            - secretRef:
                name: trip-service-secrets
          ports:
            - name: http
              containerPort: 5002
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
