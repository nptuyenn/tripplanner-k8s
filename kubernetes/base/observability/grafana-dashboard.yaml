apiVersion: v1
kind: ConfigMap
metadata:
  name: tripplanner-red-dashboard
  labels:
    app.kubernetes.io/name: tripplanner-red-dashboard
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: tripplanner
    grafana_dashboard: "1"
data:
  tripplanner-red.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "expr": "sum by (service) (rate({__name__=~\"tripplanner_(auth|trips)_http_requests_total\"}[5m]))",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Request rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "expr": "100 * (sum by (service) (rate({__name__=~\"tripplanner_(auth|trips)_http_requests_total\",status_code=~\"5..\"}[5m])) or on (service) 0 * sum by (service) (rate({__name__=~\"tripplanner_(auth|trips)_http_requests_total\"}[5m]))) / clamp_min(sum by (service) (rate({__name__=~\"tripplanner_(auth|trips)_http_requests_total\"}[5m])), 0.001)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "5xx error rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.5
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "unit": "s"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, service) (rate({__name__=~\"tripplanner_(auth|trips)_http_request_duration_seconds_bucket\"}[5m])))",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Request latency p95",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 4,
          "targets": [
            {
              "expr": "sum by (service, method, route) (rate({__name__=~\"tripplanner_(auth|trips)_http_requests_total\"}[5m]))",
              "legendFormat": "{{service}} {{method}} {{route}}",
              "refId": "A"
            }
          ],
          "title": "Requests by route",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            }
          },
          "gridPos": {
            "h": 9,
            "w": 6,
            "x": 12,
            "y": 8
          },
          "id": 5,
          "targets": [
            {
              "expr": "sum by (service) (rate({__name__=~\"tripplanner_(auth|trips)_process_cpu_seconds_total\"}[5m]))",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Application CPU",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "gridPos": {
            "h": 9,
            "w": 6,
            "x": 18,
            "y": 8
          },
          "id": 6,
          "targets": [
            {
              "expr": "max by (service) ({__name__=~\"tripplanner_(auth|trips)_process_resident_memory_bytes\"})",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Application resident memory",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 41,
      "tags": [
        "tripplanner",
        "red"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "TripPlanner RED",
      "uid": "tripplanner-red",
      "version": 1
    }

